name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff
      
      - name: Create ruff config (ignore all hidden files)
        run: echo 'exclude = ["**/.*"]' > ruff.toml
      
      - name: Run pytest
        run: python -m pytest -v
      
      - name: Run ruff check
        run: python -m ruff check . --config ruff.toml --exit-zero
      
      - name: Run compileall (skip hidden .py)
        run: python -m compileall -q -x r'[\\/]\..*\.py$' src examples