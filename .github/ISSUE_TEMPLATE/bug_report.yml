name: Bug report
description: Report a reproducible software, numerical, or documentation defect
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Description
      description: Explain the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Minimal reproducible example
      description: Include code, parameter values, and random seeds.
    validations:
      required: true
  - type: input
    attributes:
      label: Package version
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: Python, NumPy, SciPy, operating system, and relevant hardware.
